<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKAY API - Çok Yakında</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 30%, #16213e 60%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Arka plan animasyonu */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 50%;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-100px) rotate(180deg); opacity: 0.8; }
        }

        /* Ana container */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px;
        }

        /* Logo / İkon */
        .logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #00ff88, #00b4d8);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            animation: pulse 2s infinite;
            box-shadow: 0 0 60px rgba(0, 255, 136, 0.4);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(0, 255, 136, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 100px rgba(0, 255, 136, 0.8); }
        }

        /* Başlık */
        .title {
            font-size: 3.5em;
            font-weight: 900;
            background: linear-gradient(135deg, #00ff88, #00b4d8, #0077b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        /* Alt başlık */
        .subtitle {
            font-size: 1.8em;
            color: #e0e0e0;
            font-weight: 300;
            margin-bottom: 15px;
        }

        /* Açıklama */
        .description {
            font-size: 1.2em;
            color: #a0a0a0;
            max-width: 600px;
            margin: 0 auto 40px;
            line-height: 1.8;
        }

        /* API listesi */
        .api-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .api-tag {
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1em;
            font-weight: 500;
            transition: all 0.3s;
        }

        .api-tag:hover {
            background: rgba(0, 255, 136, 0.2);
            border-color: #00ff88;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
        }

        /* Loading dots */
        .loading {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 30px;
        }

        .dot {
            width: 14px;
            height: 14px;
            background: #00ff88;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Footer */
        .footer {
            margin-top: 50px;
            color: #606060;
            font-size: 0.9em;
        }

        .footer a {
            color: #00ff88;
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .title { font-size: 2em; }
            .subtitle { font-size: 1.2em; }
            .description { font-size: 1em; }
            .api-tag { font-size: 0.85em; padding: 10px 18px; }
            .logo { width: 70px; height: 70px; font-size: 35px; }
        }
    </style>
</head>
<body>

    <!-- Arka plan parçacıkları -->
    <div class="bg-particles">
        <div class="particle" style="top:10%;left:10%;width:4px;height:4px;"></div>
        <div class="particle" style="top:20%;left:80%;width:6px;height:6px;animation-delay:1s;"></div>
        <div class="particle" style="top:50%;left:15%;width:3px;height:3px;animation-delay:2s;"></div>
        <div class="particle" style="top:70%;left:70%;width:5px;height:5px;animation-delay:0.5s;"></div>
        <div class="particle" style="top:30%;left:50%;width:4px;height:4px;animation-delay:1.5s;"></div>
        <div class="particle" style="top:80%;left:30%;width:6px;height:6px;animation-delay:3s;"></div>
        <div class="particle" style="top:15%;left:40%;width:3px;height:3px;animation-delay:2.5s;"></div>
        <div class="particle" style="top:60%;left:90%;width:5px;height:5px;animation-delay:0.8s;"></div>
    </div>

    <!-- Ana içerik -->
    <div class="container">
        <div class="logo">🚀</div>
        
        <h1 class="title">SİTEYE YENİ APİLER EKLENİYOR</h1>
        <h2 class="subtitle">Çok Yakında Erişime Açılacak!</h2>
        
        <p class="description">
            Daha güçlü, daha hızlı ve daha kapsamlı API'ler için çalışıyoruz. 
            Sabrınız için teşekkür ederiz. Bizi beklemeye devam edin!
        </p>

        <div class="api-list">
            <span class="api-tag">📦 Kargo Takip API</span>
            <span class="api-tag">🔐 Auth API</span>
            <span class="api-tag">📊 Veri API</span>
            <span class="api-tag">🌐 Döviz API</span>
            <span class="api-tag">📱 SMS API</span>
        </div>

        <div class="loading">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="footer">
            Geliştirici: <a href="https://t.me/TuncaySkay" target="_blank">@TuncaySkay</a> | 
            API: <a href="/kargotakip.php?barkod=5196277493609" target="_blank">/kargotakip.php</a>
        </div>
    </div>

</body>
</html>
